<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Recipe Mind</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <div class="auth-bg"></div>

  <div class="auth-page">
    <div class="auth-card">

      <a href="index.html" class="auth-logo">
        <div class="logo-icon">🍃</div>
        Recipe Mind
      </a>

      <h1 class="auth-title">Welcome back</h1>
      <p class="auth-subtitle">Sign in to access your recipes and meal plans</p>

      <div class="alert alert-error" id="alert-error">
        <span>⚠️</span>
        <span id="alert-error-msg">Invalid email or password.</span>
      </div>

      <div class="alert alert-success" id="alert-success">
        <span>✓</span>
        <span id="alert-success-msg">Logged in successfully!</span>
      </div>

      <div class="form-group">
        <label class="form-label" for="email">Email address</label>
        <input
          type="email"
          id="email"
          class="form-input"
          placeholder="you@example.com"
          autocomplete="email"
        />
        <div class="form-error" id="email-error">Please enter a valid email.</div>
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <div class="password-wrap">
          <input
            type="password"
            id="password"
            class="form-input"
            placeholder="Your password"
            autocomplete="current-password"
          />
          <button class="password-toggle" onclick="togglePassword()" type="button" id="toggle-btn">👁</button>
        </div>
        <div class="form-error" id="password-error">Password is required.</div>
      </div>

      <button class="btn btn-primary btn-lg" style="width:100%;" id="login-btn" onclick="handleLogin()">
        Sign In
      </button>

      <div class="auth-divider">or</div>

      <button class="btn btn-secondary btn-lg" style="width:100%;" onclick="handleGoogleLogin()">
        <span>🌐</span> Continue with Google
      </button>

      <script>
        // Check for Google OAuth redirect
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');
        if (token) {
          localStorage.setItem('auth_token', token);
          localStorage.setItem('user_id', urlParams.get('user_id') || '');
          localStorage.setItem('user_email', urlParams.get('email') || '');
          localStorage.setItem('username', urlParams.get('username') || '');
          window.location.href = 'dashboard.html';
        }
      </script>

      <div class="auth-footer">
        Don't have an account? <a href="register.html">Create one free</a>
      </div>

    </div>
  </div>

  <script src="../js/config.js"></script>
  <script>
    
    (async () => {
      const user = await getCurrentUser();
      if (user) window.location.href = 'dashboard.html';
    })();

    function togglePassword() {
      const input = document.getElementById('password');
      const btn = document.getElementById('toggle-btn');
      input.type = input.type === 'password' ? 'text' : 'password';
      btn.textContent = input.type === 'password' ? '👁' : '🙈';
    }

    function showError(message) {
      document.getElementById('alert-error-msg').textContent = message;
      document.getElementById('alert-error').classList.add('show');
      document.getElementById('alert-success').classList.remove('show');
    }

    function showSuccess(message) {
      document.getElementById('alert-success-msg').textContent = message;
      document.getElementById('alert-success').classList.add('show');
      document.getElementById('alert-error').classList.remove('show');
    }

    function clearErrors() {
      document.getElementById('alert-error').classList.remove('show');
      document.getElementById('alert-success').classList.remove('show');
      document.querySelectorAll('.form-error').forEach(el => el.classList.remove('show'));
      document.querySelectorAll('.form-input').forEach(el => el.classList.remove('error'));
    }

    async function handleLogin() {
      clearErrors();

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      let valid = true;

      if (!email || !/\S+@\S+\.\S+/.test(email)) {
        document.getElementById('email').classList.add('error');
        document.getElementById('email-error').classList.add('show');
        valid = false;
      }

      if (!password) {
        document.getElementById('password').classList.add('error');
        document.getElementById('password-error').classList.add('show');
        valid = false;
      }

      if (!valid) return;

      const btn = document.getElementById('login-btn');
      btn.disabled = true;
      btn.textContent = 'Signing in...';

      try {
        const res = await fetch('/recipe-mind-final/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });

        const data = await res.json();

        if (!res.ok || data.error) {
          showError(data.error || 'Invalid credentials. Please try again.');
          btn.disabled = false;
          btn.textContent = 'Sign In';
          return;
        }

        // Store token and user info
        localStorage.setItem('auth_token', data.token);
        localStorage.setItem('user_id', data.user.id);
        localStorage.setItem('user_email', data.user.email);
        localStorage.setItem('username', data.user.username);

        showSuccess('Logged in! Redirecting...');
        // Check if there's a return URL in query params
        const params = new URLSearchParams(window.location.search);
        const returnUrl = params.get('return');
        const redirectUrl = returnUrl ? returnUrl : 'dashboard.html';
        setTimeout(() => { window.location.href = redirectUrl; }, 1000);
      } catch (err) {
        showError('Login failed. Please try again.');
        btn.disabled = false;
        btn.textContent = 'Sign In';
      }
    }

    function handleGoogleLogin() {
      // Redirect to Google OAuth
      window.location.href = '/recipe-mind-final/api/auth/google';
    }

    document.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') handleLogin();
    });
  </script>
</body>
</html>
