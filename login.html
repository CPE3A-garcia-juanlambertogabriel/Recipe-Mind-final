<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — RecipeMind</title>
  <link rel="stylesheet" href="../css/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

  <div class="auth-bg"></div>

  <div class="auth-page">
    <div class="auth-card">

      <a href="index.html" class="auth-logo">
        <div class="logo-icon">🍃</div>
        RecipeMind
      </a>

      <h1 class="auth-title">Welcome back</h1>
      <p class="auth-subtitle">Sign in to access your recipes and meal plans</p>

      <div class="alert alert-error" id="alert-error">
        <span>⚠️</span>
        <span id="alert-error-msg">Invalid email or password.</span>
      </div>

      <div class="alert alert-success" id="alert-success">
        <span>✓</span>
        <span id="alert-success-msg">Logged in successfully!</span>
      </div>

      <div class="form-group">
        <label class="form-label" for="email">Email address</label>
        <input
          type="email"
          id="email"
          class="form-input"
          placeholder="you@example.com"
          autocomplete="email"
        />
        <div class="form-error" id="email-error">Please enter a valid email.</div>
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <div class="password-wrap">
          <input
            type="password"
            id="password"
            class="form-input"
            placeholder="Your password"
            autocomplete="current-password"
          />
          <button class="password-toggle" onclick="togglePassword()" type="button" id="toggle-btn">👁</button>
        </div>
        <div class="form-error" id="password-error">Password is required.</div>
      </div>

      <button class="btn btn-primary btn-lg" style="width:100%;" id="login-btn" onclick="handleLogin()">
        Sign In
      </button>

      <div class="auth-divider">or</div>

      <button class="btn btn-secondary btn-lg" style="width:100%;" onclick="handleGoogleLogin()">
        <span>🌐</span> Continue with Google
      </button>

      <div class="auth-footer">
        Don't have an account? <a href="register.html">Create one free</a>
      </div>

    </div>
  </div>

  <script src="../js/config.js"></script>
  <script>
    
    (async () => {
      const user = await getCurrentUser();
      if (user) window.location.href = '/index.html';
    })();

    function togglePassword() {
      const input = document.getElementById('password');
      const btn = document.getElementById('toggle-btn');
      input.type = input.type === 'password' ? 'text' : 'password';
      btn.textContent = input.type === 'password' ? '👁' : '🙈';
    }

    function showError(message) {
      document.getElementById('alert-error-msg').textContent = message;
      document.getElementById('alert-error').classList.add('show');
      document.getElementById('alert-success').classList.remove('show');
    }

    function showSuccess(message) {
      document.getElementById('alert-success-msg').textContent = message;
      document.getElementById('alert-success').classList.add('show');
      document.getElementById('alert-error').classList.remove('show');
    }

    function clearErrors() {
      document.getElementById('alert-error').classList.remove('show');
      document.getElementById('alert-success').classList.remove('show');
      document.querySelectorAll('.form-error').forEach(el => el.classList.remove('show'));
      document.querySelectorAll('.form-input').forEach(el => el.classList.remove('error'));
    }

    async function handleLogin() {
      clearErrors();

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      let valid = true;

      if (!email || !/\S+@\S+\.\S+/.test(email)) {
        document.getElementById('email').classList.add('error');
        document.getElementById('email-error').classList.add('show');
        valid = false;
      }

      if (!password) {
        document.getElementById('password').classList.add('error');
        document.getElementById('password-error').classList.add('show');
        valid = false;
      }

      if (!valid) return;

      const btn = document.getElementById('login-btn');
      btn.disabled = true;
      btn.textContent = 'Signing in...';

      const { data, error } = await sb.auth.signInWithPassword({ email, password });

      if (error) {
        showError(error.message || 'Invalid credentials. Please try again.');
        btn.disabled = false;
        btn.textContent = 'Sign In';
        return;
      }

      showSuccess('Logged in! Redirecting...');
      setTimeout(() => { window.location.href = 'index.html'; }, 1000);
    }

    async function handleGoogleLogin() {
      const { error } = await sb.auth.signInWithOAuth({
        provider: 'google',
        options: { redirectTo: window.location.origin + '/index.html' }
      });
      if (error) showError(error.message);
    }

    document.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') handleLogin();
    });
  </script>
</body>
</html>
